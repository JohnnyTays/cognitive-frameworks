<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Frameworks | JohnnyTays</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5CF6;
            --dark: #0F0D1A;
            --text: #E2E8F0;
            --text-muted: #94A3B8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        p { color: var(--text-muted); margin-bottom: 3rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 2rem;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s;
        }
        .card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }
        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .card h2 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        .card .formula {
            font-family: monospace;
            color: var(--primary);
            font-size: 1.1rem;
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cognitive Frameworks</h1>
        <p>Proprietary mathematical frameworks for AI agents</p>
        
        <div class="grid">
            <a href="universal-optimization/" class="card">
                <div class="card-icon">Ψ</div>
                <h2>Universal Optimization</h2>
                <div class="formula">Z = Ψ / (X^a · Y^b)</div>
            </a>
            <a href="first-principle-distillation/" class="card">
                <div class="card-icon">Σ</div>
                <h2>First Principle Distillation</h2>
                <div class="formula">α = Σ / (1+N)</div>
            </a>
            <a href="paradox-synthesis/" class="card">
                <div class="card-icon">Ω</div>
                <h2>Paradox Synthesis</h2>
                <div class="formula">Ω = κ(A ⊗ B)</div>
            </a>
            <a href="systemic-resistance/" class="card">
                <div class="card-icon">R</div>
                <h2>Systemic Resistance</h2>
                <div class="formula">R = (Δ · I) / υ</div>
            </a>
        </div>
    </div>
</body>
</html>
